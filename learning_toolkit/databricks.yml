# This is a Databricks asset bundle definition for learning_toolkit.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: learning_toolkit
  uuid: fabd299b-3547-45dd-9af9-055246b77c2a

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-64e0f040-c326.cloud.databricks.com
    variables:
      catalog: workspace
      schema: dev
  prod:
    mode: production
    workspace:
      host: https://dbc-64e0f040-c326.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/unismankur@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/unismankur@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: prod
    permissions:
      - user_name: unismankur@gmail.com
        level: CAN_MANAGE

# The main job for learning_toolkit.
resources:
  jobs:
    sample_job:
      name: sample_job

      trigger:
        pause_status: UNPAUSED

      email_notifications:
        on_failure:
          - unismankur@gmail.com

      tasks:
        - task_key: notebook_task
          notebook_task:
            notebook_path: ../src/sample_notebook.ipynb

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
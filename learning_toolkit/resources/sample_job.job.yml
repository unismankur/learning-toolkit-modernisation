# Bronze ingest job — parameterised via bundle variables.

resources:
  jobs:
    sample_job:
      name: sample_job

      email_notifications:
        on_failure:
          - unismankur@gmail.com

      tasks:
        - task_key: bronze_ingest
          notebook_task:
            notebook_path: ../src/sample_notebook.ipynb
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: serverless_env

      environments:
        - environment_key: serverless_env
          spec:
            client: "2"

# The main pipeline for learning_toolkit

resources:
  pipelines:
    learning_toolkit_etl:
      name: learning_toolkit_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/learning_toolkit_etl"

      libraries:
        - glob:
            include: ../src/learning_toolkit_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
